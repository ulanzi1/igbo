global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: web
    scheme: http
    static_configs:
      - targets:
          - web:3000
    metrics_path: /api/metrics
    authorization:
      credentials: "${METRICS_SECRET}"

  - job_name: realtime
    scheme: http
    static_configs:
      - targets:
          - realtime:3002
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
