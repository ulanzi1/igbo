global:
  smtp_smarthost: "${ALERTMANAGER_SMTP_HOST}:${ALERTMANAGER_SMTP_PORT}"
  smtp_from: "${ALERTMANAGER_SMTP_FROM}"
  smtp_auth_username: "${ALERTMANAGER_SMTP_USERNAME}"
  smtp_auth_password: "${ALERTMANAGER_SMTP_PASSWORD}"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: ops-email
  routes:
    - match:
        severity: critical
      receiver: ops-email

receivers:
  - name: ops-email
    email_configs:
      - to: "${ALERTMANAGER_OPS_EMAIL}"
        require_tls: true
    webhook_configs:
      - url: "${ALERTMANAGER_SLACK_WEBHOOK}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
