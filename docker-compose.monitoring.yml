services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "9090:9090"
    env_file: .env
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.tpl:ro
      - ./monitoring/prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheusdata:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.2
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - app-network

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.2
    ports:
      - "9093:9093"
    env_file: .env
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tpl:ro
      - ./monitoring/alertmanager/entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
    networks:
      - app-network

volumes:
  prometheusdata:
  grafanadata:

# NOTE: app-network must be created by docker-compose.prod.yml first.
# Start prod stack before monitoring: docker compose -f docker-compose.prod.yml up -d
# Then start monitoring: docker compose -f docker-compose.monitoring.yml up -d
# Alternatively, create manually: docker network create igbo_app-network
networks:
  app-network:
    external: true
    name: igbo_app-network
