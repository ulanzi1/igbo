name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deploys — queue rather than cancel in-progress deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Reuse all CI quality checks (DRY — avoids duplicating 4 parallel jobs) ─
  ci:
    name: Quality Checks
    uses: ./.github/workflows/ci.yml

  # ─── Build Docker images and push to GHCR ────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Web image: tagged with both full SHA and :latest for rollback support
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/igbo-web:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/igbo-web:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_REALTIME_URL=${{ secrets.NEXT_PUBLIC_REALTIME_URL }}

      # Realtime image: Socket.IO server (no public env build args needed)
      - name: Build and push realtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.realtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/igbo-realtime:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/igbo-realtime:latest

  # ─── Staging auto-deploy (no approval required) ───────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [docker-build]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add staging host to known_hosts
        run: ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      # Capture currently running image tags BEFORE deploying so rollback can restore them
      - name: Capture current image tags for rollback
        id: prev-tags
        run: |
          PREV_WEB=$(ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            'docker inspect --format="{{index .RepoTags 0}}" igbo-web 2>/dev/null || echo ""')
          PREV_REALTIME=$(ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            'docker inspect --format="{{index .RepoTags 0}}" igbo-realtime 2>/dev/null || echo ""')
          echo "prev_web_tag=${PREV_WEB}" >> "$GITHUB_OUTPUT"
          echo "prev_realtime_tag=${PREV_REALTIME}" >> "$GITHUB_OUTPUT"

      - name: Copy deploy script to staging server
        run: |
          scp scripts/deploy.sh \
            "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/deploy.sh"
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            "chmod +x /tmp/deploy.sh"

      # deploy.sh: pull → up -d → health check loop → rollback on failure (exit 1)
      - name: Deploy to staging
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            "/tmp/deploy.sh \
              ~/docker-compose.prod.yml \
              ${{ secrets.STAGING_HEALTH_URL }} \
              'ghcr.io/${{ github.repository_owner }}/igbo-web:sha-${{ github.sha }}' \
              'ghcr.io/${{ github.repository_owner }}/igbo-realtime:sha-${{ github.sha }}' \
              '${{ steps.prev-tags.outputs.prev_web_tag }}' \
              '${{ steps.prev-tags.outputs.prev_realtime_tag }}'"

  # ─── Production deploy with manual approval gate ─────────────────────────────
  # Requires a reviewer to approve via GitHub environment "production" settings
  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add production host to known_hosts
        run: ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      # Same pre-deploy tag capture pattern as staging
      - name: Capture current image tags for rollback
        id: prev-tags
        run: |
          PREV_WEB=$(ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            'docker inspect --format="{{index .RepoTags 0}}" igbo-web 2>/dev/null || echo ""')
          PREV_REALTIME=$(ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            'docker inspect --format="{{index .RepoTags 0}}" igbo-realtime 2>/dev/null || echo ""')
          echo "prev_web_tag=${PREV_WEB}" >> "$GITHUB_OUTPUT"
          echo "prev_realtime_tag=${PREV_REALTIME}" >> "$GITHUB_OUTPUT"

      - name: Copy deploy script to production server
        run: |
          scp scripts/deploy.sh \
            "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/deploy.sh"
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "chmod +x /tmp/deploy.sh"

      - name: Deploy to production
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "/tmp/deploy.sh \
              ~/docker-compose.prod.yml \
              ${{ secrets.PRODUCTION_HEALTH_URL }} \
              'ghcr.io/${{ github.repository_owner }}/igbo-web:sha-${{ github.sha }}' \
              'ghcr.io/${{ github.repository_owner }}/igbo-realtime:sha-${{ github.sha }}' \
              '${{ steps.prev-tags.outputs.prev_web_tag }}' \
              '${{ steps.prev-tags.outputs.prev_realtime_tag }}'"
