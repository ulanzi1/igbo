name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Parallel quality checks ────────────────────────────────────────────────

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Check for critical vulnerabilities
        run: pnpm audit --audit-level critical || echo "::warning::pnpm audit failed (npm registry may be unavailable) — continuing"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3002
      NEXT_PUBLIC_COMMUNITY_URL: http://localhost:3000
      NEXT_PUBLIC_PORTAL_URL: http://localhost:3001
      COMMUNITY_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SESSION_UPDATE_AGE_SECONDS: "3600"
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # ⚠️ SYNC: broad-impact + turbo-flags blocks are duplicated in lint, typecheck, test jobs — update all together
      - name: Check for broad-impact changes
        id: broad-impact
        if: github.event_name == 'pull_request'
        run: |
          PATTERNS="pnpm-lock.yaml|turbo.json|tsconfig.base.json|packages/.*/package\.json|packages/.*/tsconfig\.json|\.github/workflows/ci\.yml"
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE "$PATTERNS"; then
            echo "full_suite=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Broad-impact files changed — running full suite (no --affected)"
          else
            echo "full_suite=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine turbo flags
        id: turbo-flags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.broad-impact.outputs.full_suite }}" != "true" ]; then
            echo "flags=--affected" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm exec turbo run lint ${{ steps.turbo-flags.outputs.flags }}
      - name: Run CI checks (stale imports, process.env, server-only)
        run: npx tsx scripts/ci-checks/index.ts
      - run: pnpm exec prettier --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3002
      NEXT_PUBLIC_COMMUNITY_URL: http://localhost:3000
      NEXT_PUBLIC_PORTAL_URL: http://localhost:3001
      COMMUNITY_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SESSION_UPDATE_AGE_SECONDS: "3600"
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # ⚠️ SYNC: broad-impact + turbo-flags blocks are duplicated in lint, typecheck, test jobs — update all together
      - name: Check for broad-impact changes
        id: broad-impact
        if: github.event_name == 'pull_request'
        run: |
          PATTERNS="pnpm-lock.yaml|turbo.json|tsconfig.base.json|packages/.*/package\.json|packages/.*/tsconfig\.json|\.github/workflows/ci\.yml"
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE "$PATTERNS"; then
            echo "full_suite=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Broad-impact files changed — running full suite (no --affected)"
          else
            echo "full_suite=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine turbo flags
        id: turbo-flags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.broad-impact.outputs.full_suite }}" != "true" ]; then
            echo "flags=--affected" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm exec turbo run typecheck ${{ steps.turbo-flags.outputs.flags }}

  # ─── Fail-fast gate: test and build only start when lint + typecheck both pass ─

  quality-gate:
    name: Quality Gate
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Lint and type checks passed"

  test:
    name: Unit Tests
    needs: [quality-gate]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igbo_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3002
      NEXT_PUBLIC_COMMUNITY_URL: http://localhost:3000
      NEXT_PUBLIC_PORTAL_URL: http://localhost:3001
      COMMUNITY_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SESSION_UPDATE_AGE_SECONDS: "3600"
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # ⚠️ SYNC: broad-impact + turbo-flags blocks are duplicated in lint, typecheck, test jobs — update all together
      - name: Check for broad-impact changes
        id: broad-impact
        if: github.event_name == 'pull_request'
        run: |
          PATTERNS="pnpm-lock.yaml|turbo.json|tsconfig.base.json|packages/.*/package\.json|packages/.*/tsconfig\.json|\.github/workflows/ci\.yml"
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE "$PATTERNS"; then
            echo "full_suite=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Broad-impact files changed — running full suite (no --affected)"
          else
            echo "full_suite=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine turbo flags
        id: turbo-flags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.broad-impact.outputs.full_suite }}" != "true" ]; then
            echo "flags=--affected" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm exec turbo run test ${{ steps.turbo-flags.outputs.flags }} --summarize
      - name: Integration tests (DB-dependent)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/igbo_test
        run: pnpm --filter @igbo/integration-tests test
      - name: Show test summary
        if: always()
        run: |
          echo "### Turborepo Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Cache | Exit Code |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|-----------|" >> $GITHUB_STEP_SUMMARY
          if ls .turbo/runs/*.json 1>/dev/null 2>&1; then
            for f in .turbo/runs/*.json; do
              jq -r '.tasks[] | "| \(.taskId) | \(.cacheState.source // "miss") | \(.execution.exitCode // "skipped") |"' "$f" >> $GITHUB_STEP_SUMMARY 2>/dev/null
            done
          else
            echo "No Turborepo summary available" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    needs: [quality-gate]
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3002
      NEXT_PUBLIC_COMMUNITY_URL: http://localhost:3000
      NEXT_PUBLIC_PORTAL_URL: http://localhost:3001
      COMMUNITY_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SESSION_UPDATE_AGE_SECONDS: "3600"
      AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      REDIS_URL: redis://localhost:6379
      ADMIN_EMAIL: ci@placeholder.com
      ADMIN_PASSWORD: ci-placeholder-password
      AUTH_SECRET: ci-placeholder-auth-secret-min-32-chars-long
      HETZNER_S3_ENDPOINT: https://placeholder.your-objectstorage.com
      HETZNER_S3_REGION: us-east-1
      HETZNER_S3_BUCKET: placeholder-bucket
      HETZNER_S3_ACCESS_KEY_ID: placeholder-key
      HETZNER_S3_SECRET_ACCESS_KEY: placeholder-secret
      HETZNER_S3_PUBLIC_URL: https://placeholder.your-objectstorage.com
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # Combined Turborepo + Next.js incremental cache for both apps
      - uses: actions/cache@v4
        with:
          path: |
            apps/community/.next/cache
            apps/portal/.next/cache
            node_modules/.cache/turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      # Build always runs full (no --affected) — artifacts consumed by downstream E2E + Lighthouse
      - run: pnpm exec turbo run build
      # Upload standalone server, static assets, and public directory.
      # include-hidden-files required: .next/standalone/.next/ is a hidden dir with manifests.
      - name: Upload community build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-community
          include-hidden-files: true
          path: |
            apps/community/.next/standalone
            apps/community/.next/static
            apps/community/public
          retention-days: 1
      - name: Upload portal build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-portal
          include-hidden-files: true
          path: |
            apps/portal/.next/standalone
            apps/portal/.next/static
            apps/portal/public
          retention-days: 1

  # ─── Post-build jobs (run in parallel, both need build artifact) ─────────────

  e2e:
    name: E2E Tests
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igbo_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3002
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/igbo_test
      REDIS_URL: redis://localhost:6379
      ADMIN_EMAIL: ci@placeholder.com
      ADMIN_PASSWORD: ci-placeholder-password
      AUTH_SECRET: ci-placeholder-auth-secret-min-32-chars-long
      HETZNER_S3_ENDPOINT: https://placeholder.your-objectstorage.com
      HETZNER_S3_REGION: us-east-1
      HETZNER_S3_BUCKET: placeholder-bucket
      HETZNER_S3_ACCESS_KEY_ID: placeholder-key
      HETZNER_S3_SECRET_ACCESS_KEY: placeholder-secret
      HETZNER_S3_PUBLIC_URL: https://placeholder.your-objectstorage.com
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Chromium only in CI for speed; full browser matrix runs in nightly workflow
      - run: pnpm --filter @igbo/community exec playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build-community
          path: apps/community
      # Enforce journal sync gate before applying migrations
      - name: Check migration journal sync
        run: pnpm --filter @igbo/db db:journal-check
      # Run database migrations so the standalone server has tables
      - name: Run database migrations
        run: for f in packages/db/src/migrations/*.sql; do PGPASSWORD=postgres psql -h localhost -U postgres -d igbo_test -f "$f"; done
      # In a monorepo, standalone output nests the app: .next/standalone/apps/community/
      - name: Setup standalone server assets
        run: |
          STANDALONE_APP=apps/community/.next/standalone/apps/community
          # Fallback: if not nested (non-monorepo layout), use the old path
          if [ ! -d "$STANDALONE_APP" ]; then
            STANDALONE_APP=apps/community/.next/standalone
          fi
          echo "Standalone app at: $STANDALONE_APP"
          ls -la "$STANDALONE_APP"
          cp -r apps/community/.next/static "$STANDALONE_APP/.next/static"
          cp -r apps/community/public "$STANDALONE_APP/public"
      # Playwright manages the server via webServer config
      - run: pnpm --filter @igbo/community exec playwright test --reporter=html
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igbo_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3002
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/igbo_test
      REDIS_URL: redis://localhost:6379
      ADMIN_EMAIL: ci@placeholder.com
      ADMIN_PASSWORD: ci-placeholder-password
      AUTH_SECRET: ci-placeholder-auth-secret-min-32-chars-long
      HETZNER_S3_ENDPOINT: https://placeholder.your-objectstorage.com
      HETZNER_S3_REGION: us-east-1
      HETZNER_S3_BUCKET: placeholder-bucket
      HETZNER_S3_ACCESS_KEY_ID: placeholder-key
      HETZNER_S3_SECRET_ACCESS_KEY: placeholder-secret
      HETZNER_S3_PUBLIC_URL: https://placeholder.your-objectstorage.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build-community
          path: apps/community
      - name: Check migration journal sync
        run: pnpm --filter @igbo/db db:journal-check
      - name: Run database migrations
        run: for f in packages/db/src/migrations/*.sql; do PGPASSWORD=postgres psql -h localhost -U postgres -d igbo_test -f "$f"; done
      - name: Setup standalone server assets
        run: |
          STANDALONE_APP=apps/community/.next/standalone/apps/community
          if [ ! -d "$STANDALONE_APP" ]; then
            STANDALONE_APP=apps/community/.next/standalone
          fi
          echo "Standalone app at: $STANDALONE_APP"
          cp -r apps/community/.next/static "$STANDALONE_APP/.next/static"
          cp -r apps/community/public "$STANDALONE_APP/public"
          # With shamefully-hoist=true in .npmrc, pnpm hoists all packages to
          # flat node_modules so Next.js file tracing includes them in standalone.
          # As a safety net, copy @next/env if the standalone is missing it
          # (e.g. if this artifact was built before .npmrc was added).
          STANDALONE_NM="$STANDALONE_APP/node_modules"
          if [ ! -d "$STANDALONE_NM/@next/env" ]; then
            mkdir -p "$STANDALONE_NM/@next"
            NEXT_ENV_SRC=$(find node_modules -maxdepth 6 -type d -name "env" -path "*/@next/env" 2>/dev/null | grep -v standalone | head -1)
            if [ -n "$NEXT_ENV_SRC" ]; then
              cp -rL "$NEXT_ENV_SRC" "$STANDALONE_NM/@next/" || cp -r "$NEXT_ENV_SRC" "$STANDALONE_NM/@next/"
              echo "Copied @next/env from: $NEXT_ENV_SRC"
            else
              echo "@next/env already bundled in standalone (expected with shamefully-hoist)"
            fi
          else
            echo "@next/env already present in standalone node_modules"
          fi
      - name: Start standalone server
        run: |
          if [ -f apps/community/.next/standalone/apps/community/server.js ]; then
            PORT=3000 node apps/community/.next/standalone/apps/community/server.js >/tmp/server.log 2>&1 &
          else
            PORT=3000 node apps/community/.next/standalone/server.js >/tmp/server.log 2>&1 &
          fi
          echo "Server PID: $!"
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/en > /dev/null && echo "Server ready after ${i} attempts" && break
            echo "Waiting for server... attempt $i/20"
            sleep 3
          done
          if ! curl -sf http://localhost:3000/en > /dev/null; then
            echo "=== Server failed to start. Startup log: ==="
            cat /tmp/server.log
            exit 1
          fi
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./apps/community/lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: false

# Branch protection note: required status checks should include:
# quality-gate, test, build, e2e, lighthouse (and audit as before).
# lint and typecheck are enforced via quality-gate.
