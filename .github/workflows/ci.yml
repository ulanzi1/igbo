name: CI

on:
  pull_request:
  workflow_call:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Parallel quality checks ────────────────────────────────────────────────

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Check for critical/high vulnerabilities
        run: npm audit --audit-level=high

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @igbo/community lint
      - run: pnpm exec prettier --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: turbo run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: turbo run test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3001
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # Cache incremental Next.js build output — keys on package.json hash for 40–60% speed-up
      - uses: actions/cache@v4
        with:
          path: apps/community/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-nextjs-
      - run: pnpm install --frozen-lockfile
      - run: turbo run build
      # Upload standalone server, static assets, and public directory.
      # include-hidden-files required: .next/standalone/.next/ is a hidden dir with manifests.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          include-hidden-files: true
          path: |
            apps/community/.next/standalone
            apps/community/.next/static
            apps/community/public
          retention-days: 1

  # ─── Post-build jobs (run in parallel, both need build artifact) ─────────────

  e2e:
    name: E2E Tests
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igbo_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/igbo_test
      REDIS_URL: redis://localhost:6379
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Chromium only in CI for speed; full browser matrix runs in nightly workflow
      - run: pnpm exec playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: apps/community
      # Run database migrations so the standalone server has tables
      - name: Run database migrations
        run: for f in apps/community/src/db/migrations/*.sql; do PGPASSWORD=postgres psql -h localhost -U postgres -d igbo_test -f "$f"; done
      # Prepare standalone server: static files must live inside the standalone dir
      - name: Setup standalone server assets
        run: |
          cp -r apps/community/.next/static apps/community/.next/standalone/.next/static
          cp -r apps/community/public apps/community/.next/standalone/public
      # Playwright manages the server via webServer config (command: node .next/standalone/server.js)
      - run: pnpm exec playwright test --reporter=html
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igbo_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/igbo_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: apps/community
      - name: Run database migrations
        run: for f in apps/community/src/db/migrations/*.sql; do PGPASSWORD=postgres psql -h localhost -U postgres -d igbo_test -f "$f"; done
      - name: Setup standalone server assets
        run: |
          cp -r apps/community/.next/static apps/community/.next/standalone/.next/static
          cp -r apps/community/public apps/community/.next/standalone/public
      - name: Start standalone server
        run: PORT=3000 node apps/community/.next/standalone/server.js &
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/en > /dev/null && echo "Server ready after ${i} attempts" && break
            echo "Waiting for server... attempt $i/15"
            sleep 2
          done
          # Fail fast if server never started (loop exited without break)
          curl -sf http://localhost:3000/en > /dev/null || { echo "Server failed to start after 30s"; exit 1; }
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./apps/community/lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: false

# Branch protection note: all 5 parallel jobs (audit, lint, typecheck, test, build) must be configured
# as required status checks in GitHub repository settings → Branches → Branch protection rules.
