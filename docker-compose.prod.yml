services:
  web:
    image: ${WEB_IMAGE:-igbo-web:local}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
        HETZNER_S3_PUBLIC_URL: ${HETZNER_S3_PUBLIC_URL}
        HETZNER_S3_ENDPOINT: ${HETZNER_S3_ENDPOINT}
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      REALTIME_INTERNAL_URL: http://realtime:3001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      realtime:
        condition: service_started
    networks:
      - app-network

  realtime:
    image: ${REALTIME_IMAGE:-igbo-realtime:local}
    build:
      context: .
      dockerfile: Dockerfile.realtime
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      REALTIME_CORS_ORIGIN: ${NEXT_PUBLIC_APP_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    shm_size: 128m
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    env_file: .env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  # ClamAV virus scanner — start only with: docker compose --profile clamav up -d
  # Requires ~1.5GB RAM for virus definitions database
  # App-level scanning controlled by ENABLE_CLAMAV=true env var
  clamav:
    image: clamav/clamav:stable
    profiles:
      - clamav
    restart: unless-stopped
    mem_limit: 1.5g
    cpus: 0.5
    environment:
      - FRESHCLAM_CHECKS=4
    expose:
      - "3310"
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - app-network

  # Backup sidecar — runs daily pg_dump → compress → upload to Hetzner S3
  # Full backup logic implemented in Story 12.4; this defines the container shell
  backup:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data:ro
    # Entrypoint placeholder — full cron + pg_dump + s3 upload implemented in Story 12.4
    # WARNING: Runtime package install — if container restarts during network outage, apk add
    # will fail causing a crash-loop. Story 12.4 should build a custom Dockerfile for this service.
    entrypoint:
      [
        "sh",
        "-c",
        "apk add --no-cache postgresql16-client aws-cli && echo 'Backup sidecar ready' && tail -f /dev/null",
      ]
    networks:
      - app-network

volumes:
  pgdata:
  redisdata:
  clamav-db:

networks:
  app-network:
    driver: bridge
