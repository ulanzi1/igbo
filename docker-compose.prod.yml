services:
  web:
    image: ${WEB_IMAGE:-igbo-web:local}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
        HETZNER_S3_PUBLIC_URL: ${HETZNER_S3_PUBLIC_URL}
        HETZNER_S3_ENDPOINT: ${HETZNER_S3_ENDPOINT}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      REDIS_URL: ${REDIS_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
      REALTIME_INTERNAL_URL: ${REALTIME_INTERNAL_URL:-http://realtime:3001}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      HETZNER_S3_ENDPOINT: ${HETZNER_S3_ENDPOINT}
      HETZNER_S3_REGION: ${HETZNER_S3_REGION}
      HETZNER_S3_BUCKET: ${HETZNER_S3_BUCKET}
      HETZNER_S3_ACCESS_KEY_ID: ${HETZNER_S3_ACCESS_KEY_ID}
      HETZNER_S3_SECRET_ACCESS_KEY: ${HETZNER_S3_SECRET_ACCESS_KEY}
      HETZNER_S3_PUBLIC_URL: ${HETZNER_S3_PUBLIC_URL}
      ENABLE_CLAMAV: ${ENABLE_CLAMAV:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_SUPPORT_ADDRESS: ${EMAIL_SUPPORT_ADDRESS}
      ENABLE_EMAIL_SENDING: ${ENABLE_EMAIL_SENDING:-true}
      ENABLE_GEOCODING: ${ENABLE_GEOCODING:-false}
      NOMINATIM_URL: ${NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      INCLUDE_RECEIVED_MESSAGES_IN_EXPORT: ${INCLUDE_RECEIVED_MESSAGES_IN_EXPORT:-false}
    depends_on:
      - realtime
    networks:
      - app-network

  realtime:
    image: ${REALTIME_IMAGE:-igbo-realtime:local}
    build:
      context: .
      dockerfile: Dockerfile.realtime
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: ${REDIS_URL}
      REALTIME_PORT: 3001
      REALTIME_CORS_ORIGIN: ${NEXT_PUBLIC_APP_URL}
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # ClamAV virus scanner (optional — enable by setting ENABLE_CLAMAV=true)
  # Requires ~1.5GB RAM for virus definitions database
  # clamav:
  #   image: clamav/clamav:stable
  #   restart: unless-stopped
  #   mem_limit: 1.5g
  #   environment:
  #     - FRESHCLAM_CHECKS=4
  #   healthcheck:
  #     test: ["CMD", "clamdcheck"]
  #     interval: 60s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
