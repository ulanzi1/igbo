services:
  # TODO (Story 12.1): Add Dockerfile.web for the Next.js web container.
  # The web service is deferred to the CI/CD pipeline story.
  # web:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.web  # TODO: create in Story 12.1
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: production
  #   depends_on:
  #     - realtime
  #   networks:
  #     - app-network

  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: ${REDIS_URL}
      REALTIME_PORT: 3001
      REALTIME_CORS_ORIGIN: ${NEXT_PUBLIC_APP_URL}
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # ClamAV virus scanner (optional — enable for production by setting ENABLE_CLAMAV=true)
  # Memory: ~1.5GB minimum required for virus definitions database
  # To enable: uncomment this service AND set ENABLE_CLAMAV=true in environment
  # clamav:
  #   image: clamav/clamav:stable
  #   restart: unless-stopped
  #   mem_limit: 1.5g
  #   environment:
  #     - FRESHCLAM_CHECKS=4  # Update virus definitions every 6 hours (24/4)
  #   healthcheck:
  #     test: ["CMD", "clamdcheck"]
  #     interval: 60s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
