apiVersion: v1
kind: Service
metadata:
  name: igbo-web
  namespace: { { .Values.namespace } }
  labels:
    app: igbo-web
    app.kubernetes.io/name: { { .Chart.Name } }
spec:
  selector:
    app: igbo-web
  ports:
    - name: http
      port: 80
      targetPort: { { .Values.web.port } }
      protocol: TCP
  type: ClusterIP
