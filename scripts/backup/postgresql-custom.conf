# OBIGBO PostgreSQL Custom Configuration — REFERENCE ONLY
# WAL archiving settings for point-in-time recovery (PITR)
# These settings are applied via individual -c flags in docker-compose.prod.yml
# (NOT via config_file= which would replace the entire default PostgreSQL config)

# ─── WAL Archiving ────────────────────────────────────────────────────────
archive_mode = on
archive_command = '/scripts/backup/wal-archive.sh %p %f'
# Force archiving every 5 minutes even if WAL segment isn't full — ensures RPO ~5 min
archive_timeout = 300
# replica level enables WAL streaming (required for archiving)
wal_level = replica
