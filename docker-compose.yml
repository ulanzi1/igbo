services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: igbo
      POSTGRES_PASSWORD: igbo
      POSTGRES_DB: igbo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igbo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      REALTIME_PORT: 3001
      REALTIME_CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

# Cron configuration for background jobs:
# Production: Use docker/crontab with a cron sidecar container
# Development: Run jobs manually via `npm run jobs:run -- --all` or `npm run jobs:run -- <job-name>`

volumes:
  pgdata:
  redisdata:
