services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: igbo
      POSTGRES_PASSWORD: igbo
      POSTGRES_DB: igbo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igbo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      REDIS_URL: redis://redis:6379
      REALTIME_PORT: 3002
      REALTIME_CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: igbo
      MINIO_ROOT_PASSWORD: igbopassword
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 igbo igbopassword &&
      mc mb --ignore-existing local/igbo &&
      mc anonymous set download local/igbo/uploads/ &&
      exit 0
      "

# Cron configuration for background jobs:
# Production: Use docker/crontab with a cron sidecar container
# Development: Run jobs manually via `pnpm --filter @igbo/community jobs:run -- --all` or `pnpm --filter @igbo/community jobs:run -- <job-name>`

volumes:
  pgdata:
  redisdata:
  miniodata:
